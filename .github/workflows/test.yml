name: Test Action

on:
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch:

jobs:
  test-action:
    name: Run AI Commit Reporter
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run AI Commit Reporter Action
        uses: ./
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          llm-provider: "custom"
          llm-base-url: ${{ secrets.LLM_BASE_URL }}
          llm-model: ${{ secrets.LLM_MODEL }}
          llm-api-key: ${{ secrets.LLM_API_KEY }}
